<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Student Registration Form</h2>

    <!-- Registration Form -->
    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter full name" required><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter email" required><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter password" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter phone number" required><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" required><br><br>

        <label>Select Course:</label><br>
        <select required>
            <option value="">--Select Course--</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
        </select><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Address:</label><br>
        <textarea placeholder="Enter address" rows="4" cols="30"></textarea>
        <br><br>

        <button type="submit">Register</button>

    </form>

    <hr>

    <!-- Student Data Table -->
    <h2>Student Data Table</h2>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>City</th>
            </tr>
        </thead>

        <tbody>

            </tr>

            </tr>

            <tr>
                <td>4</td>
                <td>Priya</td>

                <td>Nagpur</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
